<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="filtered">
      <div class="search">
        <input type="text" class="searchInput" placeholder="Enter To Search" />
      </div>

      <div class="select-container">
        <select id="filterByCategory"></select>
      </div>
    </div>

    <div class="containerOfBooks"></div>

    <div class="addBook">
      <input type="text" class="titleInput" placeholder="Title" />

      <input type="text" class="categoryInput" placeholder="Category" />
      <button class="AddButton">Add Book</button>
    </div>
    <script src="main.js"></script>
  </body>
</html>
